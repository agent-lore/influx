# Influx Docker Compose configuration
services:
  influx:
    image: ${INFLUX_IMAGE:-influx:dev}
    pull_policy: never
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ${INFLUX_CONTAINER_NAME:-influx}
    user: "${INFLUX_UID:-1000}:${INFLUX_GID:-1000}"
    volumes:
      - ${INFLUX_DATA_PATH:-./data}:/data
      - ${INFLUX_ARCHIVE_PATH:-./archive}:/archive
    ports:
      - "${INFLUX_ADMIN_HOST_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - INFLUX_CONFIG=/data/influx.toml
      - INFLUX_DATA_DIR=/data
      - INFLUX_ENVIRONMENT=${INFLUX_ENVIRONMENT:-dev}
      - INFLUX_OTEL_ENABLED=${INFLUX_OTEL_ENABLED:-false}
      - INFLUX_OTEL_CONSOLE_FALLBACK=${INFLUX_OTEL_CONSOLE_FALLBACK:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-influx}
      - OTEL_BSP_SCHEDULE_DELAY=${OTEL_BSP_SCHEDULE_DELAY:-30000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
